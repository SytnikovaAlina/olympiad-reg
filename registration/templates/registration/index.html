{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация на Олимпиаду</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts: Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/globals.css' %}">
    <link rel="stylesheet" href="{% static 'css/register-style.css' %}">
</head>
<body>

    <!-- Основной блок с фотографией на фоне - ИСПРАВЛЕНО -->
    <main class="registration" style="background-image: url('{% static 'images/background.png' %}');">

        <!-- Контентный слой (без фона, просто текст поверх фото) -->
        <div class="registration__content">

            <!-- Логотип (отступ слева 165px) - ИСПРАВЛЕНО -->
            <div class="registration__header">
                <img src="{% static 'images/logo.png' %}" alt="Логотип" class="registration__logo">
            </div>

            <!-- Заголовок (отступ слева 165px) -->
            <h1 class="registration__title">Регистрация участия</h1>


<form method="post" class="registration__form form">
    {% csrf_token %}


    <div class="form__row">
        <label for="{{ form.full_name.id_for_label }}" class="form__label">ФИО</label>
        <div class="form__field">
            {{ form.full_name }}
        </div>
    </div>

    <!-- Учебное заведение -->
    <div class="form__row">
        <label for="{{ form.school.id_for_label }}" class="form__label">Наименование учебного заведения</label>
        <div class="form__field">
            {{ form.school }}
        </div>
    </div>

    <!-- Телефон -->
    <div class="form__row">
        <label for="{{ form.phone.id_for_label }}" class="form__label">Телефон</label>
        <div class="form__field">
            {{ form.phone }}
        </div>
    </div>

    <!-- Email -->
    <div class="form__row">
        <label for="{{ form.email.id_for_label }}" class="form__label">E-mail</label>
        <div class="form__field">
            {{ form.email }}
        </div>
    </div>

    <!-- Кнопка -->
    <div class="form__button-wrapper">
        <button type="submit" class="form__button btn btn-primary btn-lg">
            Зарегистрироваться
        </button>
    </div>
</form>


        </div> <!-- /.registration__content -->
    </main>

    <!-- Bootstrap JS (необязательно) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
